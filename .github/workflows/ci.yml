name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: multi-agent-rag

jobs:
  # ── Lint + Type check ──────────────────────────────────────────────────────
lint:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip

    - run: pip install ruff

    - name: Ruff lint (auto-fix check)
      run: ruff check app/ tests/ --fix --exit-zero

    - name: Ruff format check
      run: ruff format app/ tests/ --check

  # ── Unit + Integration tests ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint

    env:
      ENVIRONMENT: local
      SECRET_KEY: ci-secret-key-32-chars-long-abcdefgh
      POSTGRES_DSN: postgresql+asyncpg://rag:rag@localhost:5432/ragdb
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      OPENSEARCH_HOST: localhost
      OPENSEARCH_PORT: 9200
      AWS_REGION: us-east-1
      S3_BUCKET: rag-documents
      MCP_SERVER_HOST: localhost
      MCP_SERVER_PORT: 8001

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: ragdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U rag -d ragdb"
          --health-interval 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # ── Docker build ───────────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}-worker:${{ github.sha }}

  # ── Deploy to ECS (main branch only) ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy API to ECS
        run: |
          aws ecs update-service \
            --cluster rag-cluster \
            --service rag-api \
            --force-new-deployment \
            --region us-east-1

      - name: Deploy Worker to ECS
        run: |
          aws ecs update-service \
            --cluster rag-cluster \
            --service rag-worker \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster rag-cluster \
            --services rag-api rag-worker
